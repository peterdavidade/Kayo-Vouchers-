<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password &mdash; Kayo Vouchers</title>
    <!-- CHANGE: Firebase email reset -->
    <meta name="description" content="Reset your password by receiving a secure reset link via email." />
    <link rel="stylesheet" href="style.css" />
    <!-- CHANGE: Firebase (CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
    <script defer src="script.js"></script>
  </head>

  <body>
    <header class="site-header">
      <nav class="nav container" aria-label="Primary">
        <a class="logo" href="index.html" aria-label="Kayo Vouchers Home">
          <!-- CHANGE: Removed the "K" logo mark -->
          <span class="logo-text">Kayo Vouchers</span>
        </a>

        <div class="nav-links nav-links-simple">
          <a href="index.html">Home</a>

          <button class="icon-btn" type="button" aria-label="Toggle dark mode" data-theme-toggle>
            <span class="theme-icon" aria-hidden="true" data-theme-icon>&#x263E;</span>
          </button>

          <div class="nav-user" data-nav-user hidden>
            <span class="nav-user-text" data-nav-user-text></span>
            <!-- CHANGE: Logout button is injected by JS ONLY when logged in -->
          </div>
        </div>
      </nav>
    </header>

    <main class="auth">
      <div class="container auth-grid">
        <section class="auth-intro">
          <h1>Forgot your password?</h1>
          <!-- CHANGE: Firebase email reset -->
          <p class="muted">Enter your email and we’ll send a password reset link.</p>
          <ul class="checklist">
            <!-- CHANGE: Updated copy (Firebase auth) -->
            <li>Password reset email</li>
            <li>Reset in under a minute</li>
            <li>Works on mobile</li>
          </ul>
        </section>

        <section class="card auth-card" aria-label="Forgot password">
          <div class="auth-body">
            <div class="alert" role="status" aria-live="polite" hidden data-alert></div>

            <!-- CHANGE: FORGOT PASSWORD (Email) -->
            <form class="panel" data-auth="forgot-email">
              <div class="field">
                <label for="forgot-email">Email</label>
                <input
                  id="forgot-email"
                  name="email"
                  type="email"
                  placeholder="Enter your email"
                  autocomplete="email"
                  required
                />
              </div>
              <button class="btn btn-primary btn-block" type="submit">Send Reset Email</button>

              <div class="panel-meta">
                <a class="link" href="login.html">Back to Login</a>
              </div>
            </form>
          </div>
        </section>
      </div>
    </main>

    <footer class="footer footer-simple">
      <div class="container footer-inner">
        <div class="muted">Need help? support@kayovouchers.test</div>
        <div class="muted">&copy; <span data-year></span> Kayo Vouchers</div>
      </div>
    </footer>
  </body>
</html>
