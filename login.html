<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login &mdash; Kayo Vouchers</title>
    <meta name="description" content="Login or create an account to buy vouchers instantly." />
    <link rel="stylesheet" href="style.css" />
    <!-- CHANGE: Firebase (CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
    <script defer src="script.js"></script>
  </head>

  <body>
    <header class="site-header">
      <nav class="nav container" aria-label="Primary">
        <a class="logo" href="index.html" aria-label="Kayo Vouchers Home">
          <!-- CHANGE: Removed the "K" logo mark -->
          <span class="logo-text">Kayo Vouchers</span>
        </a>

        <div class="nav-links nav-links-simple">
          <a href="index.html">Home</a>

          <button class="icon-btn" type="button" aria-label="Toggle dark mode" data-theme-toggle>
            <span class="theme-icon" aria-hidden="true" data-theme-icon>&#x263E;</span>
          </button>

          <div class="nav-user" data-nav-user hidden>
            <span class="nav-user-text" data-nav-user-text></span>
            <!-- CHANGE: Logout button is injected by JS ONLY when logged in -->
          </div>
        </div>
      </nav>
    </header>

    <main class="auth">
      <div class="container auth-grid">
        <section class="auth-intro">
          <h1>Welcome back</h1>
          <p class="muted">
            Login to buy vouchers faster and get instant delivery.
          </p>
          <ul class="checklist">
            <!-- CHANGE: Updated copy (Firebase auth) -->
            <li>Secure login with Firebase</li>
            <li>Email verification supported</li>
          </ul>
        </section>

        <section class="card auth-card" aria-label="Authentication">
          <div class="auth-body">
            <!-- Shared message box -->
            <div class="alert" role="status" aria-live="polite" hidden data-alert></div>

            <!-- CHANGE: LOGIN (Email) -->
            <form class="panel" data-auth="login-email">
              <div class="field">
                <label for="login-email">Email</label>
                <input
                  id="login-email"
                  name="email"
                  type="email"
                  placeholder="e.g. user@email.com"
                  autocomplete="email"
                  required
                />
              </div>

              <div class="field">
                <label for="login-password">Password</label>
                <input
                  id="login-password"
                  name="password"
                  type="password"
                  placeholder="Your password"
                  autocomplete="current-password"
                  required
                />
              </div>

              <button class="btn btn-primary btn-block" type="submit">Login</button>

              <div class="panel-meta">
                <a class="link" href="signup.html">Don't have an account? Create one</a>
                <a class="link" href="forgot.html">Forgot Password?</a>
              </div>
            </form>
          </div>
        </section>
      </div>
    </main>

    <footer class="footer footer-simple">
      <div class="container footer-inner">
        <div class="muted">Need help? info.karyocodes@gmail.com</div>
        <div class="muted">&copy; <span data-year></span> Kayo Vouchers</div>
      </div>
    </footer>
  </body>
</html>
